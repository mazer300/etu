<div class="login-page">
    <div class="vk-card" style="max-width: 400px; margin: 40px auto;">
        <div class="card-header text-center">
            <h3>Вход в Social Network</h3>
        </div>

        <div class="card-body">
            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="vk-form">

                <div class="form-group">
                    <label for="email">Email *</label>
                    <input
                            type="email"
                            id="email"
                            formControlName="email"
                            class="form-control"
                            [class.is-invalid]="email?.invalid && email?.touched"
                            placeholder="example@mail.ru">
                    <div *ngIf="email?.invalid && email?.touched" class="invalid-feedback">
                        <div *ngIf="email?.errors?.['required']">Введите email</div>
                        <div *ngIf="email?.errors?.['email']">Введите корректный email адрес</div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Пароль *</label>
                    <input
                            type="password"
                            id="password"
                            formControlName="password"
                            class="form-control"
                            [class.is-invalid]="password?.invalid && password?.touched"
                            placeholder="Введите пароль">
                    <div *ngIf="password?.invalid && password?.touched" class="invalid-feedback">
                        <div *ngIf="password?.errors?.['required']">Введите пароль</div>
                    </div>
                </div>

                <div *ngIf="errorMessage" class="error-message">
                    <i class="fas fa-exclamation-triangle me-2"></i>
                    {{ errorMessage }}
                </div>

                <button
                        type="submit"
                        class="vk-btn btn-primary"
                        [disabled]="loginForm.invalid || isSubmitting"
                        style="width: 100%;">
                    <i class="fas fa-sign-in-alt" *ngIf="!isSubmitting"></i>
                    <i class="fas fa-spinner fa-spin" *ngIf="isSubmitting"></i>
                    {{ isSubmitting ? 'Вход...' : 'Войти' }}
                </button>

                <div class="text-center mt-3">
                    <small class="text-muted">
                        Нет аккаунта?
                        <a routerLink="/register" class="text-primary">Зарегистрироваться</a>
                    </small>
                </div>
            </form>
        </div>
    </div>
</div>
