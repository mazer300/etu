<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Старинная Библиотека</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
    <header class="library-header">
        <h1><i class="fas fa-book"></i> Старинная Библиотека</h1>
        <p>Хранилище мудрости веков</p>
    </header>

    <div class="controls">
        <div class="filters">
            <button class="filter active" data-filter="all">
                <i class="fas fa-book"></i> Все книги
            </button>
            <button class="filter" data-filter="available">
                <i class="fas fa-check-circle"></i> В наличии
            </button>
            <button class="filter" data-filter="borrowed">
                <i class="fas fa-user"></i> Выданы
            </button>
            <button class="filter" data-filter="overdue">
                <i class="fas fa-exclamation-triangle"></i> Просрочены
            </button>
        </div>
        <button class="btn-add" id="addBookBtn">
            <i class="fas fa-plus"></i> Добавить книгу
        </button>
    </div>

    <div class="library-decoration"></div>

    <div class="books-grid" id="booksGrid">
        <!-- Книги будут добавляться динамически -->
    </div>

    <div class="empty-state" id="emptyState" style="display: none;">
        <i class="fas fa-book-open"></i>
        <h3>Библиотека пуста</h3>
        <p>Добавьте первую книгу в вашу коллекцию</p>
    </div>
</div>

<!-- Модальное окно добавления/редактирования книги -->
<dialog class="dialog" id="bookDialog">
    <div class="dialog-header">
        <span id="dialogTitle">Добавить книгу</span>
        <button class="dialog-close" id="closeDialog">&times;</button>
    </div>
    <div class="dialog-content">
        <form id="bookForm">
            <div class="form-group">
                <label for="bookTitle">Название книги:</label>
                <input type="text" id="bookTitle" required>
            </div>
            <div class="form-group">
                <label for="bookAuthor">Автор:</label>
                <input type="text" id="bookAuthor" required>
            </div>
            <div class="form-group">
                <label for="bookYear">Год издания:</label>
                <input type="number" id="bookYear" min="1000" max="2024" required>
            </div>
            <div class="form-group">
                <label for="bookDescription">Описание:</label>
                <textarea id="bookDescription"></textarea>
            </div>
            <div class="dialog-actions">
                <button type="button" class="btn btn-primary" id="cancelBtn">Отмена</button>
                <button type="submit" class="btn btn-warning">Сохранить</button>
            </div>
        </form>
    </div>
</dialog>

<!-- Модальное окно выдачи книги -->
<dialog class="dialog" id="borrowDialog">
    <div class="dialog-header">
        <span>Выдать книгу</span>
        <button class="dialog-close" id="closeBorrowDialog">&times;</button>
    </div>
    <div class="dialog-content">
        <form id="borrowForm">
            <div class="form-group">
                <label for="borrowerName">Имя читателя:</label>
                <input type="text" id="borrowerName" required>
            </div>
            <div class="form-group">
                <label for="returnDate">Дата возврата:</label>
                <input type="date" id="returnDate" required>
            </div>
            <div class="dialog-actions">
                <button type="button" class="btn btn-primary" id="cancelBorrowBtn">Отмена</button>
                <button type="submit" class="btn btn-warning">Выдать</button>
            </div>
        </form>
    </div>
</dialog>

<script src="app.js"></script>
</body>
</html>
