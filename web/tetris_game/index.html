<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Tetris - Вход</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(30deg, #000000 0%, #666666 120%);
        }
        .login-form {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        input[type="text"] {
            padding: 10px;
            margin: 10px 0;
            width: 200px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        input[type="submit"] {
            background: #BBBBBB;
            color: black;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
<form class="login-form" action="main.html" method="get" onsubmit="storeUsername()">
    <h2>Вход в игру Тетрис</h2>
    <label>
        Введите имя:<br>
        <input type="text" id="username" placeholder="Имя пользователя" required>
    </label>
    <br>
    <input type="submit" value="Начать игру">
</form>

<script>
    function storeUsername() {
        const username = document.getElementById('username').value;
        localStorage.setItem('tetris.username', username);
    }

    // Восстановление последнего имени пользователя
    window.onload = function() {
        const savedUsername = localStorage.getItem('tetris.username');
        if (savedUsername) {
            document.getElementById('username').value = savedUsername;
        }
    }
</script>
</body>
</html>
