<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Stock Exchange Admin</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 10px rgba(0,0,0,.1);
        }
        .status {
            padding: 10px;
            border-radius: 4px;
            margin: 10px 0;
        }
        .status.ok {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
<div id="root">
    <div class="container">
        <h1>Биржевое приложение</h1>
        <div id="backend-status" class="status">Проверка бэкенда...</div>
        <div id="frontend-status" class="status ok">Фронтенд работает</div>

        <h3>Страницы:</h3>
        <ul>
            <li><a href="/brokers">Брокеры</a></li>
            <li><a href="/stocks">Акции</a></li>
            <li><a href="/exchange">Настройки биржи</a></li>
        </ul>
    </div>
</div>

<script>
    function checkBackendStatus() {
        fetch("http://localhost:3011/api/health")
            .then(response => response.json())
            .then(data => {
                const element = document.getElementById("backend-status");
                if (element) {
                    element.className = "status ok";
                    element.innerHTML = "✅ Бэкенд работает";
                }
            })
            .catch(error => {
                const element = document.getElementById("backend-status");
                if (element) {
                    element.className = "status error";
                    element.innerHTML = "❌ Бэкенд не доступен: " + error.message;
                }
            });
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', checkBackendStatus);
    } else {
        checkBackendStatus();
    }
</script>
</body>
</html>
